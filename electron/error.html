<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Connection Error</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            min-height:100vh;
            background: linear-gradient(135deg, #0a3d20, #0f5030);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: white;
            text-align: center; padding: 40px;
        }
        .icon { font-size: 64px; margin-bottom: 24px; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 12px; }
        p { color: #6ee7b7; font-size: 16px; margin-bottom: 32px; line-height: 1.6; }
        button {
            padding: 14px 32px; border-radius: 12px;
            background: linear-gradient(to right, #22c55e, #10b981);
            color: white; font-size: 16px; font-weight: 700;
            border: none; cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        .hint { margin-top: 20px; font-size: 13px; color: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div class="icon">⚠️</div>
    <h1>No Connection</h1>
    <p>Please make sure you have internet access to be able to launch this app.</p>
    <button onclick="window.location.reload()">🔄 Retry Connection</button>
</body>
</html>
