<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 480px; height: 380px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0a3d20 0%, #0f5030 50%, #0a3d20 100%);
            border-radius: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        img {
            width: 110px; height: 110px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
            object-fit: cover;
            box-shadow: 0 0 40px rgba(52,211,153,0.4);
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }
        h1 { color: #fff; font-size: 26px; font-weight: 800; margin-bottom: 6px; letter-spacing: 0.5px; }
        p { color: #6ee7b7; font-size: 14px; font-weight: 500; margin-bottom: 30px; }
        .dots { display: flex; gap: 10px; }
        .dot {
            width: 12px; height: 12px; border-radius: 50%;
            background: #34d399; animation: bounce 1.2s ease-in-out infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; background: #6ee7b7; }
        .dot:nth-child(3) { animation-delay: 0.4s; background: #a7f3d0; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.6; }
            40% { transform: translateY(-12px); opacity: 1; }
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(52,211,153,0.3); }
            50% { box-shadow: 0 0 60px rgba(52,211,153,0.6); }
        }
        .version { position: absolute; bottom: 16px; color: rgba(255,255,255,0.3); font-size: 11px; }
    </style>
</head>
<body>
    <img src="../public/logo.jpg" alt="Logo" onerror="this.style.display='none'">
    <h1>Obamax Gardens</h1>
    <p>Management System</p>
    <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>
    <span class="version">Loading...</span>
</body>
</html>
